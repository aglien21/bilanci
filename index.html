<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Finance - Sheety Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .pad { 
            background: white; border: 2px solid transparent; padding: 20px 10px; 
            border-radius: 24px; text-align: center; cursor: pointer;
            transition: 0.2s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .pad:active { transform: scale(0.95); background: #f1f5f9; }
        .pad.active { border-color: #3b82f6; background: #eff6ff; box-shadow: 0 0 0 4px #dbeafe; }
        .box { background: white; padding: 25px; border-radius: 32px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 18px; border-radius: 20px; border: 1px solid #e2e8f0; outline: none; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px #dbeafe; }
        .btn-main { width: 100%; padding: 20px; border-radius: 22px; font-weight: 800; transition: 0.3s; letter-spacing: -0.5px; }
        .btn-main:active { transform: scale(0.97); opacity: 0.9; }
    </style>
</head>
<body class="p-4">

<div id="login-ui" class="max-w-xs mx-auto mt-16 box text-center">
    <div class="flex flex-col items-center mb-8">
        <div class="w-20 h-20 bg-gradient-to-br from-blue-600 to-cyan-400 rounded-[2.2rem] shadow-lg flex items-center justify-center mb-4 transform rotate-3">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
        </div>
        <h2 class="text-2xl font-black text-slate-900 tracking-tighter uppercase italic">Family <span class="text-blue-600">Finance</span></h2>
    </div>
    
    <div class="space-y-3">
        <select id="user-select" class="text-center font-bold text-slate-700 bg-slate-50">
            <option>Duke u lidhur...</option>
        </select>
        <input id="pass" type="password" placeholder="PIN" class="text-center bg-slate-50">
        <button id="btn-login" class="btn-main bg-slate-900 text-white shadow-xl mt-2">HYR NË SISTEM</button>
    </div>
</div>

<div id="app-ui" class="max-w-md mx-auto hidden">
    <div class="box mb-6 border-2 border-blue-50">
        <p class="text-[10px] font-black text-slate-400 uppercase text-center mb-2 tracking-widest">Shuma për të ruajtur</p>
        <input id="shuma" type="number" placeholder="0 L" class="text-center text-5xl font-black text-blue-600 border-none bg-transparent" inputmode="numeric">
        
        <div class="grid grid-cols-3 gap-3 mt-8">
            <div class="pad" onclick="selectPad(this, 'Ushqime')">🍎<br><span class="text-[10px] font-bold uppercase mt-1 block">Buka</span></div>
            <div class="pad" onclick="selectPad(this, 'Lojra')">🎮<br><span class="text-[10px] font-bold uppercase mt-1 block">Lojra</span></div>
            <div class="pad" onclick="selectPad(this, 'Internet')">🌐<br><span class="text-[10px] font-bold uppercase mt-1 block">Net</span></div>
            <div class="pad" onclick="selectPad(this, 'Shkollë')">📚<br><span class="text-[10px] font-bold uppercase mt-1 block">Shkollë</span></div>
            <div class="pad" onclick="selectPad(this, 'Dhurata')">🎁<br><span class="text-[10px] font-bold uppercase mt-1 block">Dhurata</span></div>
            <div class="pad" onclick="selectPad(this, 'Tjera')">✨<br><span class="text-[10px] font-bold uppercase mt-1 block">Tjera</span></div>
        </div>
    </div>

    <button id="btn-save" class="btn-main bg-blue-600 text-white shadow-lg shadow-blue-200 uppercase text-sm">RUAJ TË DHËNAT ✅</button>
    
    <p id="status-msg" class="text-center mt-6 text-xs font-bold text-slate-400 italic"></p>
</div>

<script>
    const API_BASE = "https://api.sheety.co/808224abb5ea9a6f463a4cff82acb534/test";
    const API_SHPENZIMET = `${API_BASE}/shpenzimet`;
    const API_ANETARET = `${API_BASE}/anetaret`;

    let uAktual = "", katZgjedhur = "", listaAnetareve = [];

    // Ngarko Anetaret
    window.onload = async () => {
        try {
            const res = await fetch(API_ANETARET);
            const data = await res.json();
            listaAnetareve = data.anetaret;
            
            const selU = document.getElementById("user-select");
            selU.innerHTML = "";
            listaAnetareve.forEach(u => {
                selU.innerHTML += `<option value="${u.emri}">${u.emri.toUpperCase()}</option>`;
            });
        } catch (err) {
            document.getElementById("user-select").innerHTML = "<option>Gabim në lidhje!</option>";
        }
    };

    // Login
    document.getElementById("btn-login").onclick = () => {
        const emri = document.getElementById("user-select").value;
        const pin = document.getElementById("pass").value;
        const userFound = listaAnetareve.find(a => a.emri === emri && String(a.pin) === pin);

        if (userFound) {
            uAktual = emri;
            document.getElementById("login-ui").classList.add("hidden");
            document.getElementById("app-ui").classList.remove("hidden");
        } else {
            alert("⚠️ PIN i gabuar! Provoje përsëri.");
        }
    };

    window.selectPad = (el, kat) => {
        document.querySelectorAll('.pad').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        katZgjedhur = kat;
    };

    // Ruaj Shpenzimin
    document.getElementById("btn-save").onclick = async () => {
        const shuma = document.getElementById("shuma").value;
        const status = document.getElementById("status-msg");

        if (!shuma || !katZgjedhur) {
            alert("Shkruaj shumën dhe zgjidh një kategori!");
            return;
        }

        document.getElementById("btn-save").innerText = "DUKE U RUAJTUR...";
        
        const dataToSend = {
            shpenzimet: {
                data: new Date().toLocaleDateString('sq-AL'),
                perdoruesi: uAktual,
                kategoria: katZgjedhur,
                shuma: Number(shuma),
                shenime: "Shtuar nga App"
            }
        };

        try {
            const response = await fetch(API_SHPENZIMET, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataToSend)
            });

            if (response.ok) {
                status.innerText = "Sapo u ruajt në Google Sheets! 🚀";
                document.getElementById("shuma").value = "";
                document.querySelectorAll('.pad').forEach(p => p.classList.remove('active'));
                katZgjedhur = "";
                setTimeout(() => { status.innerText = ""; }, 3000);
            }
        } catch (err) {
            alert("Ndodhi një gabim! Sigurohu që Sheety është aktiv.");
        } finally {
            document.getElementById("btn-save").innerText = "RUAJ TË DHËNAT ✅";
        }
    };
</script>
</body>
</html>
