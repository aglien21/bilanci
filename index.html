<!DOCTYPE html>
<html lang="sq">
<head>
    <link rel="apple-touch-icon" href="https://github.com/aglien21/bilanci/blob/main/IMG_1535.pngk">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financa Family Pro v4.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --bg: #f8fafc; --box: white; --txt: #0f172a; --border: #e2e8f0; }
        .dark { --bg: #020617; --box: #0f172a; --txt: #f8fafc; --border: #1e293b; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; transition: 0.3s; overflow-x: hidden; }
        .box { background: var(--box); padding: 20px; border-radius: 28px; border: 1px solid var(--border); }
        .pad { background: var(--box); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid var(--border); cursor: pointer; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.95); }
        
        #toast { visibility: hidden; min-width: 200px; margin-left: -100px; background-color: #333; color: #fff; text-align: center; border-radius: 12px; padding: 12px; position: fixed; z-index: 1000; left: 50%; top: 30px; font-size: 12px; font-weight: bold; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 1.5s; }
        @keyframes fadein { from {top: 0; opacity: 0;} to {top: 30px; opacity: 1;} }
        @keyframes fadeout { from {top: 30px; opacity: 1;} to {top: 0; opacity: 0;} }
    </style>
</head>
<body class="p-4 pb-24">

<div id="toast">Veprimi u krye! ✅</div>

<div id="login-ui" class="fixed inset-0 z-[200] bg-slate-950 flex items-center justify-center p-6 text-center">
    <div class="w-full max-w-sm p-10 rounded-[40px] bg-slate-900 border border-blue-500/20 shadow-2xl">
        <span class="text-[80px] block mb-6 drop-shadow-lg">🧑🏽‍💼🏡👩🏻‍💼</span>
        <h2 class="text-white text-3xl font-black mb-2 uppercase tracking-tighter">💰Buxheti💰 <span class="text-blue-500">Familjar</span></h2>
        <p class="text-slate-500 text-[12px] tracking-[2px] font-bold mb-10">Created By AGLIEN</p>
        <select id="user-select" class="w-full p-5 mb-4 rounded-2xl bg-slate-800 text-white border border-slate-700 outline-none text-center font-bold text-lg">
            <option disabled selected>Duke ngarkuar përdoruesit...</option>
        </select>
        <input id="pass" type="password" placeholder="PIN" class="w-full p-5 mb-8 rounded-2xl text-center text-2xl font-black bg-white outline-none" inputmode="numeric" onkeydown="if(event.key === 'Enter') document.getElementById('btn-login').click()">
        <button id="btn-login" class="w-full p-6 bg-blue-600 text-white rounded-2xl font-black uppercase text-lg shadow-lg">Hyni ne Sistem</button>
    </div>
</div>

<div id="app-ui" class="max-w-md mx-auto hidden">
    <div class="flex justify-between items-center mb-4 gap-2">
        <button onclick="toggleDark()" class="p-3 bg-slate-200 dark:bg-slate-800 rounded-2xl active-scale">🌓</button>
        
        <select id="header-user-select" class="bg-blue-600 text-white font-black text-[10px] px-2 py-2 rounded-xl uppercase outline-none shadow-md hidden text-center cursor-pointer max-w-[120px] active-scale transition" onchange="merrRaportin()">
            </select>

        <div class="flex gap-1 flex-1">
            <select id="muaji" class="p-2 bg-white dark:bg-slate-800 rounded-xl text-[10px] font-bold outline-none flex-1 border border-slate-200 dark:border-slate-700"></select>
            <select id="viti" class="p-2 bg-white dark:bg-slate-800 rounded-xl text-[10px] font-bold outline-none flex-1 border border-slate-200 dark:border-slate-700"></select>
        </div>
        <button onclick="shkarkoPDF()" class="p-3 bg-red-600 text-white rounded-2xl font-black text-[10px] active-scale">Raporti Mujor</button>
    </div>

    <div class="p-6 bg-slate-900 rounded-[35px] mb-4 shadow-2xl text-center text-white relative">
        <h1 id="r-mbetja" class="text-4xl font-black text-blue-400 mb-2">0 L</h1>
        <button onclick="hapModalFonde()" class="bg-green-500 text-white text-[10px] font-black px-4 py-2 rounded-full active-scale shadow-lg mb-3">+ SHTO TË ARDHURA</button>
        
        <div id="piechart" style="width: 100%; height: 180px;"></div>
        <div class="mt-4 px-2 text-[10px] font-black uppercase text-left">
            <div class="flex justify-between mb-1 text-slate-400"><span>Dalje / Limiti</span><span id="txt-limit" class="text-white">0 / 0 L</span></div>
            <div class="w-full bg-white/10 rounded-full h-2.5 overflow-hidden">
                <div id="bar-limit" class="bg-blue-500 h-full w-0 transition-all duration-1000"></div>
            </div>
        </div>
    </div>

    <div class="box mb-4 bg-gradient-to-br from-indigo-700 to-blue-900 text-white border-none shadow-xl">
        <div class="flex justify-between items-center mb-2 italic px-1">
            <input id="obj-emri" class="bg-transparent border-none text-xs font-bold text-white outline-none w-1/2" onchange="syncKursimToSheet()" placeholder="Emri i kursimit" onkeydown="if(event.key==='Enter') this.blur()">
            <span id="obj-perq" class="text-[10px] font-black bg-white/20 px-2 py-1 rounded-md">0%</span>
        </div>
        <div class="w-full bg-black/20 rounded-full h-1.5 mb-3">
            <div id="obj-bar" class="bg-white h-full rounded-full transition-all duration-700" style="width: 0%"></div>
        </div>
        <div class="flex justify-between items-center px-1">
            <span id="obj-vlerat" class="text-[11px] font-black">0 / 0 L</span>
            <div class="flex gap-2">
                <button onclick="shtoKursim()" class="bg-green-500 text-[9px] font-black px-3 py-2 rounded-xl active-scale">+ SHTO</button>
                <button onclick="ndryshoQellimin()" class="bg-white/20 text-[9px] font-black px-3 py-2 rounded-xl active-scale">🎯</button>
                <button onclick="zeroKursimet()" class="bg-red-500 text-[9px] font-black px-3 py-2 rounded-xl active-scale">0️⃣</button>
            </div>
        </div>
    </div>

    <div class="box mb-4 border-2 border-orange-400 bg-orange-50/5">
        <h3 class="text-[10px] font-black uppercase text-orange-600 mb-3 flex justify-between items-center">
            <span>🛒 Lista e Pazarit (Cloud)</span> 
            <button onclick="pastroPazarin()" class="text-red-500 text-[9px] active-scale underline">Pastro listen</button>
        </h3>
        <div id="pazar-lista" class="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto mb-4 no-scrollbar"></div>
        <div class="flex gap-2">
            <button onclick="hapModalKategorite('pazar')" class="flex-1 p-3 bg-orange-600 text-white rounded-xl font-black text-[10px] uppercase shadow-md active-scale">
                + Nga Kategorite
            </button>
            <button onclick="shfaqManualPazar()" class="p-3 bg-slate-100 dark:bg-slate-800 rounded-xl text-lg active-scale">Artikull📝</button>
        </div>
    </div>

    <div class="box mb-6 border-2 border-blue-600 shadow-xl text-center relative">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-[10px] font-black uppercase text-blue-600">💳 Arkëtim / Pagesë</h3>
            <button onclick="pastroShporten()" class="text-red-500 text-xl active-scale">Pastro🗑️</button>
        </div>
        <input id="shuma" type="number" placeholder="0 L" class="text-4xl font-black text-blue-600 bg-transparent border-none w-full text-center outline-none mb-2" readonly>
        <div id="shporta-list" class="bg-slate-100 dark:bg-slate-800 p-3 rounded-xl min-h-[40px] text-[11px] font-black text-slate-500 overflow-y-auto max-h-32 text-left space-y-1">Shporta është bosh...</div>
        
        <div class="grid grid-cols-2 gap-2 mt-3">
            <button onclick="hapModalKategorite('arka')" class="p-3 bg-blue-50 dark:bg-slate-700 text-blue-600 dark:text-blue-300 rounded-xl font-black uppercase text-[10px] border border-blue-200 dark:border-slate-600 active-scale">+ Nga Kategoritë</button>
            <button onclick="shtoManualNeArke()" class="p-3 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-xl font-black uppercase text-[10px] border border-slate-200 dark:border-slate-600 active-scale">📝 SHKRUAJ ARTIKULL</button>
        </div>

        <button id="btn-ruaj" onclick="ruajShpenzim()" class="w-full mt-4 p-4 bg-blue-600 text-white rounded-2xl font-black uppercase active-scale shadow-lg">RUAJ PAGESËN ✅</button>
    </div>

    <div class="box mb-4">
        <h3 class="text-[10px] font-black uppercase text-slate-400 mb-3 italic">Transaksionet e Fundit</h3>
        <div id="historiku-list" class="space-y-2 text-[11px]"></div>
    </div>
</div>

<div id="modal-fonde" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-[300]">
    <div class="bg-white dark:bg-slate-800 w-full max-w-xs rounded-[35px] p-6 text-center shadow-2xl">
        <h3 class="text-sm font-black mb-4 uppercase text-green-600">Shto Të Ardhura</h3>
        <input id="fonde-shuma" type="number" placeholder="Shuma (Lekë)" class="w-full p-4 mb-2 rounded-xl font-black text-2xl text-center border-2 border-slate-100 outline-none dark:bg-slate-900 dark:text-white dark:border-slate-700" onkeydown="if(event.key === 'Enter') document.getElementById('fonde-burimi').focus()">
        <input id="fonde-burimi" type="text" placeholder="Burimi (psh: Paga)" class="w-full p-4 mb-4 rounded-xl font-bold text-center border-2 border-slate-100 outline-none dark:bg-slate-900 dark:text-white dark:border-slate-700" onkeydown="if(event.key === 'Enter') ruajFonde()">
        <div class="flex gap-2">
            <button onclick="mbyllModalFonde()" class="w-1/4 p-4 bg-slate-100 dark:bg-slate-700 rounded-2xl font-black italic dark:text-white">X</button>
            <button id="btn-ruaj-fonde" onclick="ruajFonde()" class="w-3/4 p-4 bg-green-600 text-white rounded-2xl font-black uppercase">SHTO</button>
        </div>
    </div>
</div>

<div id="modal-arka-manual" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-[300]">
    <div class="bg-white dark:bg-slate-800 w-full max-w-xs rounded-[35px] p-6 text-center shadow-2xl">
        <h3 class="text-sm font-black mb-4 uppercase text-blue-600">Shkruaj Artikull</h3>
        <input id="arka-emri-input" type="text" placeholder="Emri (psh: Bukë)" class="w-full p-4 mb-2 rounded-xl font-bold text-center border-2 border-slate-100 outline-none dark:bg-slate-900 dark:text-white dark:border-slate-700" onkeydown="if(event.key === 'Enter') document.getElementById('arka-shuma-input').focus()">
        <input id="arka-shuma-input" type="number" placeholder="Lekë" class="w-full p-4 mb-4 rounded-xl font-black text-2xl text-center border-2 border-slate-100 outline-none dark:bg-slate-900 dark:text-white dark:border-slate-700" onkeydown="if(event.key === 'Enter') kryejShtimManualArka()">
        <div class="flex gap-2">
            <button onclick="mbyllArkaManual()" class="w-1/4 p-4 bg-slate-100 dark:bg-slate-700 rounded-2xl font-black italic dark:text-white">X</button>
            <button onclick="kryejShtimManualArka()" class="w-3/4 p-4 bg-blue-600 text-white rounded-2xl font-black uppercase">SHTO</button>
        </div>
    </div>
</div>

<div id="modal-kategorite" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-[300]">
    <div class="bg-white dark:bg-slate-800 w-full max-w-sm rounded-[35px] p-6 text-center max-h-[85vh] flex flex-col relative shadow-2xl">
        <button onclick="mbyllModalKategorite()" class="absolute top-4 right-6 text-2xl font-black text-slate-400 active-scale">×</button>
        <h3 id="modal-kat-titulli" class="text-sm font-black mb-4 uppercase">Zgjidh</h3>
        <input id="modal-search" type="text" placeholder="🔍 Kërko artikull..." class="w-full p-4 mb-4 rounded-xl text-xs font-bold outline-none bg-slate-50 dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-700 text-slate-800 dark:text-white" onkeyup="kerkoArtikullModal()">
        <button id="modal-kthehu-btn" onclick="shfaqKategoriteModal()" class="hidden mb-3 w-full p-2 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 text-[10px] font-black uppercase rounded-xl border border-slate-200 dark:border-slate-600 flex items-center justify-center gap-2 active-scale"><span>⬅️ Kthehu</span></button>
        <div id="modal-pads-container" class="grid grid-cols-2 gap-3 overflow-y-auto no-scrollbar pb-4"></div>
    </div>
</div>

<div id="modal-manual" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-6 z-[400]">
    <div class="bg-white dark:bg-slate-800 w-full max-w-xs rounded-[35px] p-6 text-center shadow-2xl">
        <h3 id="manual-titulli" class="text-sm font-black mb-4 uppercase text-blue-600">Vendos Shumën</h3>
        <input id="manual-input" type="number" class="w-full p-5 mb-4 rounded-2xl font-black text-4xl text-center border-2 border-blue-200 outline-none dark:bg-slate-900 dark:text-white" inputmode="decimal" onkeydown="if(event.key === 'Enter') mbyllModalManualDheShto()">
        <div class="flex gap-2">
            <button onclick="mbyllModalManual()" class="w-1/4 p-4 bg-slate-100 dark:bg-slate-700 rounded-2xl font-black italic dark:text-white">X</button>
            <button onclick="mbyllModalManualDheShto()" class="w-3/4 p-4 bg-blue-600 text-white rounded-2xl font-black uppercase">SHTO</button>
        </div>
    </div>
</div>

<div id="modal-pazar-tekst" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-[300]">
    <div class="bg-white dark:bg-slate-800 w-full max-w-xs rounded-[35px] p-6 text-center">
        <h3 class="text-sm font-black mb-4 uppercase text-orange-600">Shto Shënim Manual</h3>
        <input id="pazar-manual-input" type="text" placeholder="Psh: Bukë..." class="w-full p-4 mb-4 rounded-2xl font-bold text-center border-2 border-slate-200 outline-none dark:bg-slate-900 dark:text-white dark:border-slate-700" onkeydown="if(event.key === 'Enter') shtoNePazarManual()">
        <div class="flex gap-2">
            <button onclick="mbyllManualPazar()" class="w-1/4 p-4 bg-slate-100 dark:bg-slate-700 rounded-2xl font-black italic dark:text-white">X</button>
            <button onclick="shtoNePazarManual()" class="w-3/4 p-4 bg-orange-600 text-white rounded-2xl font-black uppercase">SHTO</button>
        </div>
    </div>
</div>

<script>
    google.charts.load('current', {'packages':['corechart']});
    // VENDOS KETU LINKUN TEND TE RI
    const URL = "https://script.google.com/macros/s/AKfycbyzawFXDnZxTAQm5SejKl46w8eRdHFwoumbiOvCHP4U62iPqKoAQv9_sf9YUdOszQy-/exec"; 

    let uAktual = "", allData = {}, shportaObj = {}, historiData = [], pazarData = [], kategoriaAktuale = "", modalContext = "arka", globalRaport = {}; 
    let prindiZgjedhur = ""; 

    window.onload = async () => {
        const m = document.getElementById("muaji"), v = document.getElementById("viti");
        const uSelect = document.getElementById("user-select");
        
        const muajt = ["Janar", "Shkurt", "Mars", "Prill", "Maj", "Qershor", "Korrik", "Gusht", "Shtator", "Tetor", "Nëntor", "Dhjetor"];
        muajt.forEach((emri, i) => { m.innerHTML += `<option value="${i+1}" ${i+1==new Date().getMonth()+1?'selected':''}>${emri}</option>`; });
        for(let i=2025; i<=2027; i++) v.innerHTML += `<option value="${i}" ${i==2026?'selected':''}>${i}</option>`;
        
        m.onchange = v.onchange = () => merrRaportin();
        if(localStorage.getItem("dark-mode") === "true") document.body.classList.add("dark");

        try {
            const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "get_data" }) });
            allData = await r.json();
            if(allData && allData.users) {
                uSelect.innerHTML = "";
                allData.users.forEach(u => { uSelect.innerHTML += `<option value="${u}">${u}</option>`; });
            }
        } catch(e) {
            uSelect.innerHTML = "<option>Gabim lidhjeje</option>";
        }
    };

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg; t.className = "show";
        setTimeout(() => { t.className = t.className.replace("show", ""); }, 2000);
    }

    function toggleDark() { 
        let isDark = document.body.classList.toggle("dark"); 
        localStorage.setItem("dark-mode", isDark); 
        if(uAktual) merrRaportin(); 
    }

    document.getElementById("btn-login").onclick = async () => {
        const u = document.getElementById("user-select").value, p = document.getElementById("pass").value;
        const btn = document.getElementById("btn-login");
        btn.innerText = "Duke u lidhur...";
        
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "login", user: u, pass: p }) });
        const d = await r.json();
        
        if(d.status == "ok") { 
            uAktual = u; 
            
            // Krijojme opsionet tek menuja lart
            const usSelect = document.getElementById("header-user-select");
            usSelect.innerHTML = `<option value="TOTALI">👨‍👩‍👧‍👦 TOTALI</option>`;
            allData.users.forEach(user => {
                usSelect.innerHTML += `<option value="${user}">👤 ${user}</option>`;
            });
            
            usSelect.value = "TOTALI"; // By default te shohim te gjithe familjen
            usSelect.classList.remove("hidden");
            
            document.getElementById("login-ui").classList.add("hidden"); 
            document.getElementById("app-ui").classList.remove("hidden"); 
            merrRaportin(); fetchPazarCloud();
        } else { 
            alert("PIN i gabuar!"); 
            btn.innerText = "Hyni ne Sistem";
        }
    };

    function hapModalFonde() {
        document.getElementById("fonde-shuma").value = "";
        document.getElementById("fonde-burimi").value = "";
        document.getElementById("modal-fonde").classList.remove("hidden");
        document.getElementById("fonde-shuma").focus(); 
    }
    function mbyllModalFonde() { document.getElementById("modal-fonde").classList.add("hidden"); }

    async function ruajFonde() {
        let v = document.getElementById("fonde-shuma").value;
        let b = document.getElementById("fonde-burimi").value || "Të ndryshme";
        if(!v || v <= 0) return;
        
        const btn = document.getElementById("btn-ruaj-fonde");
        btn.innerText = "..."; btn.disabled = true;

        try {
            await fetch(URL, { method: "POST", body: JSON.stringify({ action: "shto_fond", user: uAktual, shuma: v, burimi: b }) });
            mbyllModalFonde();
            merrRaportin();
            showToast("Të ardhurat u shtuan! ✅");
        } catch(e) { alert("Gabim gjatë lidhjes me serverin!"); }
        btn.innerText = "SHTO"; btn.disabled = false;
    }

    function shtoManualNeArke() { 
        prindiZgjedhur = ""; 
        document.getElementById("modal-arka-manual").classList.remove("hidden"); 
        document.getElementById("arka-emri-input").focus(); 
    }
    function mbyllArkaManual() { document.getElementById("modal-arka-manual").classList.add("hidden"); }
    function kryejShtimManualArka() {
        const e = document.getElementById("arka-emri-input").value;
        const s = document.getElementById("arka-shuma-input").value;
        if(e && s && s > 0) { 
            shtoNeShporte(e, s, prindiZgjedhur); 
            document.getElementById("arka-emri-input").value = ""; 
            document.getElementById("arka-shuma-input").value = ""; 
            prindiZgjedhur = ""; 
            mbyllArkaManual(); 
            showToast(`+ ${e} u shtua!`);
        }
    }

    function hapModalKategorite(context) {
        prindiZgjedhur = ""; 
        modalContext = context;
        document.getElementById("modal-kategorite").classList.remove("hidden");
        document.getElementById("modal-search").value = "";
        const titulli = document.getElementById("modal-kat-titulli");
        titulli.innerText = (context === 'arka') ? "Shto në Arkë" : "Shto në Pazar";
        titulli.className = (context === 'arka') ? "text-sm font-black mb-4 uppercase text-blue-600" : "text-sm font-black mb-4 uppercase text-orange-600";
        shfaqKategoriteModal();
        document.getElementById("modal-search").focus(); 
    }
    function mbyllModalKategorite() { document.getElementById("modal-kategorite").classList.add("hidden"); }
    
    function shfaqKategoriteModal() {
        document.getElementById("modal-kthehu-btn").classList.add("hidden");
        let h = "";
        allData.kats.forEach(k => {
            let func = (k.kaNen === true || k.kaNen === "Po" || k.kaNen === "TRUE") ? `shfaqNenkategoriteModal('${k.emri}')` : `seleksionoArtikullModal('${k.emri}', 0, '${k.emri}')`;
            h += `<div class="p-4 bg-slate-50 dark:bg-slate-700/50 rounded-2xl border border-slate-100 dark:border-slate-700 flex flex-col items-center justify-center cursor-pointer active-scale transition" onclick="${func}">
                    <span class="text-[10px] font-black uppercase text-center">${k.emri}</span>
                  </div>`;
        });
        document.getElementById("modal-pads-container").innerHTML = h;
    }

    function shfaqNenkategoriteModal(prindi) {
        document.getElementById("modal-kthehu-btn").classList.remove("hidden");
        let h = "";
        allData.nenkats.forEach(n => {
            if(n.prindi == prindi) {
                h += `<div class="p-4 ${modalContext === 'arka' ? 'bg-blue-50 border-blue-100 dark:bg-blue-900/10' : 'bg-orange-50 border-orange-100 dark:bg-orange-900/10'} rounded-2xl border flex flex-col items-center justify-center cursor-pointer active-scale transition" onclick="seleksionoArtikullModal('${n.emri}', ${n.cmimi || 0}, '${prindi}')">
                        <span class="text-[10px] font-black uppercase text-center">${n.emri}</span>
                        ${n.cmimi > 0 ? `<span class="text-[9px] font-bold mt-1 opacity-60">${n.cmimi}L</span>` : ''}
                      </div>`;
            }
        });
        
        h += `<div class="p-4 bg-slate-100 border-slate-300 dark:bg-slate-800 dark:border-slate-600 rounded-2xl border border-dashed flex flex-col items-center justify-center cursor-pointer active-scale transition" onclick="artikullIriNgaNenkategoria('${prindi}')">
                <span class="text-[10px] font-black uppercase text-center text-slate-500 dark:text-slate-400">+ TJETËR</span>
              </div>`;
              
        document.getElementById("modal-pads-container").innerHTML = h;
    }

    function artikullIriNgaNenkategoria(prindi) {
        prindiZgjedhur = prindi; 
        mbyllModalKategorite();
        if(modalContext === 'arka') { 
            document.getElementById("modal-arka-manual").classList.remove("hidden");
            document.getElementById("arka-emri-input").focus(); 
        } else { 
            document.getElementById("modal-pazar-tekst").classList.remove("hidden");
            document.getElementById("pazar-manual-input").focus(); 
        }
    }

    function kerkoArtikullModal() {
        let txt = document.getElementById("modal-search").value.toLowerCase().trim();
        if(txt === "") { shfaqKategoriteModal(); return; }
        document.getElementById("modal-kthehu-btn").classList.remove("hidden");
        let h = "";
        allData.nenkats.forEach(n => {
            if(n.emri.toLowerCase().includes(txt)) {
                h += `<div class="p-4 ${modalContext === 'arka' ? 'bg-blue-50 border-blue-100 dark:bg-blue-900/10' : 'bg-orange-50 border-orange-100 dark:bg-orange-900/10'} rounded-2xl border flex flex-col items-center justify-center cursor-pointer active-scale transition" onclick="seleksionoArtikullModal('${n.emri}', ${n.cmimi || 0}, '${n.prindi}')">
                        <span class="text-[10px] font-black uppercase text-center">${n.emri}</span>
                      </div>`;
            }
        });
        document.getElementById("modal-pads-container").innerHTML = h || `<div class="col-span-2 py-10 text-slate-400 text-xs italic">Nuk u gjet asgjë...</div>`;
    }

    function seleksionoArtikullModal(emri, cmimi, prindi) {
        prindiZgjedhur = prindi || emri; 
        if(modalContext === 'arka') {
            if(cmimi > 0) { shtoNeShporte(emri, cmimi, prindiZgjedhur); showToast(`+ ${emri} shtuar!`); } 
            else { shfaqModalManual(emri); } 
        } else {
            shtoNePazarSpecifik(emri, prindiZgjedhur); showToast(`🛒 ${emri} në pazar!`);
        }
    }

    function initKursimet(kurs) {
        if(kurs) {
            localStorage.setItem("kursime_mbledhura", kurs.mbledhur || 0);
            localStorage.setItem("obj_vlera", kurs.synimi || 0);
            localStorage.setItem("obj_emri", kurs.emri || "Kursim");
            document.getElementById("obj-emri").value = kurs.emri;
            perditesoKasaforten();
        }
    }
    function perditesoKasaforten() {
        let m = parseFloat(localStorage.getItem("kursime_mbledhura")) || 0, t = parseFloat(localStorage.getItem("obj_vlera")) || 0;
        let p = t > 0 ? Math.min((m/t)*100, 100) : 0;
        document.getElementById("obj-bar").style.width = p + "%";
        document.getElementById("obj-perq").innerText = Math.floor(p) + "%";
        document.getElementById("obj-vlerat").innerText = `${m.toLocaleString()} / ${t.toLocaleString()} L`;
    }
    async function syncKursimToSheet() {
        const e = document.getElementById("obj-emri").value; localStorage.setItem("obj_emri", e);
        await fetch(URL, { method: "POST", body: JSON.stringify({ action: "sync_kursim", user: uAktual, emri: e, mbledhur: localStorage.getItem("kursime_mbledhura"), synimi: localStorage.getItem("obj_vlera") }) });
    }
    async function shtoKursim() { 
        let v = prompt("Sa lekë do të kursesh?"); 
        if(v && !isNaN(v)){ 
            localStorage.setItem("kursime_mbledhura", (parseFloat(localStorage.getItem("kursime_mbledhura"))||0)+parseFloat(v)); 
            perditesoKasaforten(); syncKursimToSheet(); 
            await fetch(URL, { method: "POST", body: JSON.stringify({ action: "shto", user: uAktual, kat: "Kursime", shuma: v, shenime: "Shtuar në kursime" }) });
            merrRaportin(); showToast("U kursyen " + v + " L!");
        }
    }
    function ndryshoQellimin() { let t = prompt("Synimi i ri (Lekë):"); if(t){ localStorage.setItem("obj_vlera", t); perditesoKasaforten(); syncKursimToSheet(); }}
    function zeroKursimet() { if(confirm("Zero kursimin?")) { localStorage.setItem("kursime_mbledhura", 0); perditesoKasaforten(); syncKursimToSheet(); }}

    function shtoNeShporte(e, c, p = "") {
        let prindKategori = p || prindiZgjedhur || e; 
        if (shportaObj[e]) { 
            shportaObj[e].s += 1; 
        } else { 
            shportaObj[e] = {s: 1, c: parseFloat(c), p: prindKategori}; 
        }
        perditesoArken();
    }
    function hiqNgaShporta(e) {
        if (shportaObj[e]) {
            if (shportaObj[e].s > 1) shportaObj[e].s -= 1; else delete shportaObj[e];
            perditesoArken();
        }
    }
    function perditesoArken() {
        let t = 0, h = "";
        for(let x in shportaObj) { 
            t += (shportaObj[x].s * shportaObj[x].c); 
            h += `<div class="flex justify-between items-center border-b dark:border-slate-700 py-2 font-bold"><span>${x} x${shportaObj[x].s}</span><div class="flex items-center gap-3"><span class="text-blue-500">${(shportaObj[x].s * shportaObj[x].c)} L</span><button onclick="hiqNgaShporta('${x}')" class="text-red-500 bg-red-50 dark:bg-red-900/20 px-2 rounded-lg text-xs font-black">-</button></div></div>`;
        }
        document.getElementById("shuma").value = t;
        document.getElementById("shporta-list").innerHTML = h || "Shporta është bosh...";
    }
    function pastroShporten() { shportaObj = {}; perditesoArken(); }

    async function ruajShpenzim() {
        let v = document.getElementById("shuma").value; if(!v || v <= 0) return;
        const btn = document.getElementById("btn-ruaj"); btn.innerText = "Duke u ruajtur..."; btn.disabled = true;
        let fatureTekst = "";
        for (let x in shportaObj) { fatureTekst += `${x} x${shportaObj[x].s} (${shportaObj[x].s * shportaObj[x].c}L)\n`; }
        
        let firstItem = Object.keys(shportaObj)[0];
        let kategoriaPerServer = shportaObj[firstItem].p || firstItem;

        try {
            await fetch(URL, { method: "POST", body: JSON.stringify({ action: "shto", user: uAktual, kat: kategoriaPerServer, shuma: v, shenime: fatureTekst.trim() }) });
            pastroShporten(); merrRaportin(); showToast("Pagesa u krye! ✅");
        } catch(e) { alert("Gabim!"); }
        btn.innerText = "KRYEJ PAGESËN ✅"; btn.disabled = false;
    }

    async function fetchPazarCloud() {
        try {
            let res = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "get_pazar" }) });
            let dat = await res.json();
            if(dat.pazar_list) { pazarData = JSON.parse(dat.pazar_list); shfaqPazarin(); }
        } catch(e) {}
    }
    function syncPazarCloud() { fetch(URL, { method: "POST", body: JSON.stringify({ action: "sync_pazar", pazar_list: JSON.stringify(pazarData) }) }); }
    function shfaqPazarin() {
        let h = ""; 
        pazarData.forEach((p, i) => { 
            h += `<div class="pad bg-orange-600 text-white text-[11px] font-black border-none shadow-sm active-scale" onclick="pazarTeArka('${p.emri}', ${i})">${p.emri}</div>`; 
        }); 
        document.getElementById("pazar-lista").innerHTML = h;
    }
    function shtoNePazarSpecifik(emri, prindi = "") { 
        let p = prindi || prindiZgjedhur || emri;
        pazarData.push({emri: emri, prindi: p}); 
        shfaqPazarin(); 
        syncPazarCloud(); 
    }
    function shfaqManualPazar() { 
        prindiZgjedhur = ""; 
        document.getElementById("modal-pazar-tekst").classList.remove("hidden"); 
        document.getElementById("pazar-manual-input").focus(); 
    }
    function mbyllManualPazar() { document.getElementById("modal-pazar-tekst").classList.add("hidden"); }
    function shtoNePazarManual() { 
        let i = document.getElementById("pazar-manual-input"); 
        if(i.value) { 
            shtoNePazarSpecifik(i.value, prindiZgjedhur); 
            i.value = ""; 
            prindiZgjedhur = ""; 
            mbyllManualPazar(); 
            showToast("U shtua!"); 
        } 
    }
    function pazarTeArka(emri, index) {
        let c = prompt(`Çmimi për "${emri}":`);
        if(c && !isNaN(c)) { 
            shtoNeShporte(emri, c, pazarData[index].prindi || emri); 
            pazarData.splice(index, 1); 
            shfaqPazarin(); 
            syncPazarCloud(); 
        }
    }
    function pastroPazarin() { if(confirm("Fshij gjithë listën?")) { pazarData = []; shfaqPazarin(); syncPazarCloud(); } }

    async function merrRaportin() {
        const m = document.getElementById("muaji").value, v = document.getElementById("viti").value;
        // Lexojmë se kë pamje ka zgjedhur përdoruesi nga dropdown
        const pamjaZgjedhur = document.getElementById("header-user-select").value || "TOTALI";
        
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "raporti", muaji: m, viti: v, user: uAktual, pamja_user: pamjaZgjedhur }) });
        const d = await r.json(); globalRaport = d; historiData = d.lista;
        document.getElementById("r-mbetja").innerText = d.mbetja.toLocaleString() + " L";
        
        let totalLimit = 0; allData.kats.forEach(k => totalLimit += (parseFloat(k.limiti) || 0));
        let perq = totalLimit > 0 ? (d.dalje / totalLimit) * 100 : 0;
        document.getElementById("bar-limit").style.width = Math.min(perq, 100) + "%";
        document.getElementById("txt-limit").innerText = `${d.dalje.toLocaleString()} / ${totalLimit.toLocaleString()} L`;
        
        let hHtml = ""; 
        d.lista.slice(0, 15).forEach(x => {
            let fatureDetaje = "";
            if(x.n) {
                let detajet = x.n.trim().replace(/\n/g, "<br>");
                fatureDetaje = `<div class="mt-3 p-3 bg-white dark:bg-slate-800 rounded-xl border-l-4 border-blue-500 shadow-sm">
                                    <div class="text-[11px] text-slate-700 dark:text-slate-200 font-mono leading-relaxed w-full">${detajet}</div>
                                </div>`;
            }

            // Kemi shtuar dhe emrin e user-it te vogel prane kategorise qe te duket se kush e beri blerjen
            let userBadge = pamjaZgjedhur === "TOTALI" ? `<span class="bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-300 px-1 py-0.5 rounded text-[8px] ml-1">${x.u}</span>` : "";

            hHtml += `<div class="border-b dark:border-slate-700 py-4 flex flex-col">
                        <div class="flex justify-between items-center w-full mb-1">
                            <div>
                                <span class="font-black text-[11px] uppercase">${x.k}</span>
                                ${userBadge}
                                <span class="text-[10px] text-slate-400 ml-2">${x.d}</span>
                            </div>
                            <span class="${x.t === 'hyrje' ? 'text-green-500' : 'text-red-500'} font-bold text-[12px]">
                                ${x.t === 'hyrje' ? '+' : '-'}${Math.abs(x.s).toLocaleString()} L
                            </span>
                        </div>
                        ${fatureDetaje}
                      </div>`;
        });
        document.getElementById("historiku-list").innerHTML = hHtml;
        initKursimet(d.kurs); shfaqGrafikun(d.grafiku);
    }

    function shfaqGrafikun(data) {
        let gD = [['Kategoria', 'Lekë']]; for(let k in data) gD.push([k, data[k]]);
        if(gD.length > 1) {
            new google.visualization.PieChart(document.getElementById('piechart')).draw(google.visualization.arrayToDataTable(gD), {
                backgroundColor: 'transparent', colors: ['#3b82f6', '#10b981', '#ef4444', '#f59e0b', '#8b5cf6'],
                legend: { position: 'right', textStyle: { color: '#ffffff', fontSize: 10, bold: true } }, 
                chartArea: {width:'100%', height:'100%'}, pieHole: 0.5
            });
        } else {
            document.getElementById('piechart').innerHTML = `<div class="flex items-center justify-center h-full text-slate-400 italic text-xs">Nuk ka të dhëna...</div>`;
        }
    }

    function shfaqModalManual(emri) {
        kategoriaAktuale = emri; document.getElementById("manual-titulli").innerText = "Shuma: " + emri;
        document.getElementById("manual-input").value = ""; document.getElementById("modal-manual").classList.remove("hidden");
        document.getElementById("manual-input").focus(); 
    }
    function mbyllModalManual() { document.getElementById("modal-manual").classList.add("hidden"); }
    function mbyllModalManualDheShto() {
        let v = document.getElementById("manual-input").value;
        if(v && v > 0) { 
            shtoNeShporte(kategoriaAktuale, v, prindiZgjedhur); 
            mbyllModalManual(); 
            showToast(`+ ${kategoriaAktuale} shtuar!`); 
        }
    }

    function shkarkoPDF() {
        const { jsPDF } = window.jspdf; 
        const doc = new jsPDF();
        const muajt = ["Janar", "Shkurt", "Mars", "Prill", "Maj", "Qershor", "Korrik", "Gusht", "Shtator", "Tetor", "Nëntor", "Dhjetor"];
        const muajiEmri = muajt[document.getElementById("muaji").value - 1];
        const viti = document.getElementById("viti").value;
        
        let docUserTitle = document.getElementById("header-user-select").value;
        if(docUserTitle === "TOTALI") docUserTitle = "FAMILJA (TOTAL)";

        doc.setFillColor(15, 23, 42); 
        doc.rect(0, 0, 210, 45, 'F');
        
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(22);
        doc.setFont("helvetica", "bold");
        doc.text("FINANCA FAMILY", 14, 20);
        
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.text(`PERIUDHA: ${muajiEmri} ${viti}`, 14, 28);
        doc.text(`PERDORUESI: ${docUserTitle.toUpperCase()}`, 14, 34);

        doc.setFillColor(248, 250, 252); 
        doc.roundedRect(14, 50, 182, 35, 3, 3, 'F');
        
        doc.setTextColor(15, 23, 42);
        doc.setFontSize(9);
        doc.text("HYRJE TOTALE", 25, 62);
        doc.text("DALJE TOTALE", 85, 62);
        doc.text("MBETJA FINALE", 145, 62);

        doc.setFontSize(14);
        doc.setFont("helvetica", "bold");
        doc.setTextColor(16, 185, 129); 
        doc.text(`${globalRaport.hyrje.toLocaleString()} L`, 25, 72);
        
        doc.setTextColor(239, 68, 68); 
        doc.text(`${globalRaport.dalje.toLocaleString()} L`, 85, 72);
        
        doc.setTextColor(59, 130, 246); 
        doc.text(`${globalRaport.mbetja.toLocaleString()} L`, 145, 72);

        doc.setTextColor(100, 116, 139);
        doc.setFontSize(11);
        doc.text("DETAJET E TRANSAKSIONEVE", 14, 100);

        const rreshtat = historiData.map(x => [
            x.d, 
            x.u, // Shtuar user-i në tabelë
            x.k, 
            x.n ? x.n.replace(/\n/g, ", ") : "---", 
            (x.t=="hyrje"?"+":"-")+Math.abs(x.s).toLocaleString()+" L"
        ]);

        doc.autoTable({
            head: [['Data', 'Kush', 'Kategoria', 'Pershkrimi', 'Shuma']],
            body: rreshtat,
            startY: 105,
            theme: 'striped',
            headStyles: { fillColor: [59, 130, 246], fontSize: 10 },
            styles: { fontSize: 8 },
            columnStyles: { 4: { halign: 'right', fontStyle: 'bold' } }
        });

        const finalY = doc.lastAutoTable.finalY + 10;
        doc.setFontSize(8);
        doc.setTextColor(150);
        doc.text("Gjeneruar automatikisht nga Financa Family App", 14, finalY);

        doc.save(`Bilanci_${docUserTitle}_${muajiEmri}_${viti}.pdf`);
    }
</script>
</body>
</html>
