<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financa Family Pro v4.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --bg: #f8fafc; --box: white; --txt: #0f172a; --border: #e2e8f0; }
        .dark { --bg: #020617; --box: #0f172a; --txt: #f8fafc; --border: #1e293b; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; transition: 0.3s; overflow-x: hidden; }
        .box { background: var(--box); padding: 20px; border-radius: 28px; border: 1px solid var(--border); }
        .pad { background: var(--box); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid var(--border); cursor: pointer; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.95); }
        
        #toast { visibility: hidden; min-width: 200px; margin-left: -100px; background-color: #333; color: #fff; text-align: center; border-radius: 12px; padding: 12px; position: fixed; z-index: 1000; left: 50%; top: 30px; font-size: 12px; font-weight: bold; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 1.5s; }
        @keyframes fadein { from {top: 0; opacity: 0;} to {top: 30px; opacity: 1;} }
        @keyframes fadeout { from {top: 30px; opacity: 1;} to {top: 0; opacity: 0;} }
    </style>
</head>
<body class="p-4 pb-24">

<div id="toast">Veprimi u krye! ✅</div>

<div id="login-ui" class="fixed inset-0 z-[200] bg-slate-950 flex items-center justify-center p-6 text-center">
    <div class="w-full max-w-xs p-8 rounded-[40px] bg-slate-900 border border-blue-500/20 shadow-2xl">
        <span class="text-7xl block mb-4">💎</span>
        <h2 class="text-white text-3xl font-black mb-2 uppercase tracking-tighter">✍🏼Financa✍🏼 <span class="text-blue-500">Family</span></h2>
        <p class="text-slate-500 text-[14px] tracking-[2px] font-bold mb-8">Created By AGLIEN</p>
        
        <select id="user-select" class="w-full p-4 mb-3 rounded-2xl bg-slate-800 text-white border border-slate-700 outline-none text-center font-bold">
            <option disabled selected>Duke ngarkuar përdoruesit...</option>
        </select>
        
        <input id="pass" type="password" placeholder="PIN" class="w-full p-4 mb-8 rounded-2xl text-center text-xl font-black bg-white outline-none" inputmode="numeric">
        <button id="btn-login" class="w-full p-5 bg-blue-600 text-white rounded-2xl font-black uppercase shadow-lg active-scale">Hyni ne Sistem</button>
    </div>
</div>

<div id="app-ui" class="max-w-md mx-auto hidden">
    <div class="flex justify-between items-center mb-4 gap-2">
        <button onclick="toggleDark()" class="p-3 bg-slate-200 dark:bg-slate-800 rounded-2xl active-scale">🌓</button>
        
        <div id="header-user" class="bg-blue-600 text-white font-black text-[10px] px-4 py-3 rounded-2xl uppercase flex items-center justify-center min-w-[100px] shadow-lg">
            GATI...
        </div>

        <div class="flex gap-1 flex-1">
            <select id="muaji" class="p-2 bg-white dark:bg-slate-800 rounded-xl text-[10px] font-bold outline-none flex-1 border border-slate-200 dark:border-slate-700"></select>
            <select id="viti" class="p-2 bg-white dark:bg-slate-800 rounded-xl text-[10px] font-bold outline-none flex-1 border border-slate-200 dark:border-slate-700"></select>
        </div>
        <button onclick="shkarkoPDF()" class="p-3 bg-red-600 text-white rounded-2xl font-black text-[10px] active-scale">PDF</button>
    </div>

    <div class="p-6 bg-slate-900 rounded-[35px] mb-4 shadow-2xl text-center text-white relative">
        <h1 id="r-mbetja" class="text-4xl font-black text-blue-400 mb-2">0 L</h1>
        <button onclick="hapModalFonde()" class="bg-green-500 text-white text-[10px] font-black px-4 py-2 rounded-full active-scale shadow-lg mb-3">+ SHTO TË ARDHURA</button>
        
        <div id="piechart" style="width: 100%; height: 180px;"></div>
        <div class="mt-4 px-2 text-[10px] font-black uppercase text-left">
            <div class="flex justify-between mb-1 text-slate-400"><span>Dalje / Limiti</span><span id="txt-limit" class="text-white">0 / 0 L</span></div>
            <div class="w-full bg-white/10 rounded-full h-2.5 overflow-hidden">
                <div id="bar-limit" class="bg-blue-500 h-full w-0 transition-all duration-1000"></div>
            </div>
        </div>
    </div>

    <div class="box mb-4 bg-gradient-to-br from-indigo-700 to-blue-900 text-white border-none shadow-xl">
        <div class="flex justify-between items-center mb-2 italic px-1">
            <input id="obj-emri" class="bg-transparent border-none text-xs font-bold text-white outline-none w-1/2" onchange="syncKursimToSheet()" placeholder="Emri i kursimit">
            <span id="obj-perq" class="text-[10px] font-black bg-white/20 px-2 py-1 rounded-md">0%</span>
        </div>
        <div class="w-full bg-black/20 rounded-full h-1.5 mb-3">
            <div id="obj-bar" class="bg-white h-full rounded-full transition-all duration-700" style="width: 0%"></div>
        </div>
        <div class="flex justify-between items-center px-1">
            <span id="obj-vlerat" class="text-[11px] font-black">0 / 0 L</span>
            <div class="flex gap-2">
                <button onclick="shtoKursim()" class="bg-green-500 text-[9px] font-black px-3 py-2 rounded-xl active-scale">+ SHTO</button>
                <button onclick="ndryshoQellimin()" class="bg-white/20 text-[9px] font-black px-3 py-2 rounded-xl active-scale">🎯</button>
                <button onclick="zeroKursimet()" class="bg-red-500 text-[9px] font-black px-3 py-2 rounded-xl active-scale">0️⃣</button>
            </div>
        </div>
    </div>

    <div class="box mb-4 border-2 border-orange-400 bg-orange-50/5">
        <h3 class="text-[10px] font-black uppercase text-orange-600 mb-3 flex justify-between items-center">
            <span>🛒 Lista e Pazarit</span> 
            <button onclick="pastroPazarin()" class="text-red-500 text-[9px] active-scale underline">Pastro</button>
        </h3>
        <div id="pazar-lista" class="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto mb-4 no-scrollbar"></div>
        <div class="flex gap-2">
            <button onclick="hapModalKategorite('pazar')" class="flex-1 p-3 bg-orange-600 text-white rounded-xl font-black text-[10px] uppercase shadow-md active-scale">
                + Nga Lista
            </button>
            <button onclick="shfaqManualPazar()" class="p-3 bg-slate-100 dark:bg-slate-800 rounded-xl text-lg active-scale">📝</button>
        </div>
    </div>

    <div class="box mb-6 border-2 border-blue-600 shadow-xl text-center relative">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-[10px] font-black uppercase text-blue-600">💳 Arkëtim / Pagesë</h3>
            <button onclick="pastroShporten()" class="text-red-500 text-xl active-scale">🗑️</button>
        </div>
        <input id="shuma" type="number" placeholder="0 L" class="text-4xl font-black text-blue-600 bg-transparent border-none w-full text-center outline-none mb-2" readonly>
        <div id="shporta-list" class="bg-slate-100 dark:bg-slate-800 p-3 rounded-xl min-h-[40px] text-[11px] font-black text-slate-500 overflow-y-auto max-h-32 text-left space-y-1">Shporta është bosh...</div>
        
        <div class="grid grid-cols-2 gap-2 mt-3">
            <button onclick="hapModalKategorite('arka')" class="p-3 bg-blue-50 dark:bg-slate-700 text-blue-600 dark:text-blue-300 rounded-xl font-black uppercase text-[10px] border border-blue-200 dark:border-slate-600 active-scale">+ Nga Lista</button>
            <button onclick="shtoManualNeArke()" class="p-3 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-xl font-black uppercase text-[10px] border border-slate-200 dark:border-slate-600 active-scale">📝 Manual</button>
        </div>
        <button id="btn-ruaj" onclick="ruajShpenzim()" class="w-full mt-4 p-4 bg-blue-600 text-white rounded-2xl font-black uppercase active-scale shadow-lg">KRYEJ PAGESËN ✅</button>
    </div>

    <div class="box mb-4">
        <h3 class="text-[10px] font-black uppercase text-slate-400 mb-3 italic">Transaksionet e Fundit</h3>
        <div id="historiku-list" class="space-y-2 text-[11px]"></div>
    </div>
</div>

<div id="modal-fonde" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-[300]">
    <div class="bg-white dark:bg-slate-800 w-full max-w-xs rounded-[35px] p-6 text-center shadow-2xl">
        <h3 class="text-sm font-black mb-4 uppercase text-green-600">Shto Të Ardhura</h3>
        <input id="fonde-shuma" type="number" placeholder="Shuma (Lekë)" class="w-full p-4 mb-2 rounded-xl font-black text-2xl text-center border-2 border-slate-100 outline-none dark:bg-slate-900 dark:text-white">
        <input id="fonde-burimi" type="text" placeholder="Burimi" class="w-full p-4 mb-4 rounded-xl font-bold text-center border-2 border-slate-100 outline-none dark:bg-slate-900 dark:text-white">
        <div class="flex gap-2">
            <button onclick="mbyllModalFonde()" class="w-1/4 p-4 bg-slate-100 dark:bg-slate-700 rounded-2xl font-black italic">X</button>
            <button id="btn-ruaj-fonde" onclick="ruajFonde()" class="w-3/4 p-4 bg-green-600 text-white rounded-2xl font-black uppercase">SHTO</button>
        </div>
    </div>
</div>

<div id="modal-arka-manual" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-[300]">
    <div class="bg-white dark:bg-slate-800 w-full max-w-xs rounded-[35px] p-6 text-center shadow-2xl">
        <h3 class="text-sm font-black mb-4 uppercase text-blue-600">Artikull Manual</h3>
        <input id="arka-emri-input" type="text" placeholder="Emri" class="w-full p-4 mb-2 rounded-xl font-bold text-center border-2 border-slate-100 outline-none dark:bg-slate-900 dark:text-white">
        <input id="arka-shuma-input" type="number" placeholder="Lekë" class="w-full p-4 mb-4 rounded-xl font-black text-2xl text-center border-2 border-slate-100 outline-none dark:bg-slate-900 dark:text-white">
        <div class="flex gap-2">
            <button onclick="mbyllArkaManual()" class="w-1/4 p-4 bg-slate-100 dark:bg-slate-700 rounded-2xl font-black italic">X</button>
            <button onclick="kryejShtimManualArka()" class="w-3/4 p-4 bg-blue-600 text-white rounded-2xl font-black uppercase">SHTO</button>
        </div>
    </div>
</div>

<div id="modal-kategorite" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-[300]">
    <div class="bg-white dark:bg-slate-800 w-full max-w-sm rounded-[35px] p-6 text-center max-h-[85vh] flex flex-col relative shadow-2xl">
        <button onclick="mbyllModalKategorite()" class="absolute top-4 right-6 text-2xl font-black text-slate-400 active-scale">×</button>
        <h3 id="modal-kat-titulli" class="text-sm font-black mb-4 uppercase">Zgjidh</h3>
        <input id="modal-search" type="text" placeholder="🔍 Kërko artikull..." class="w-full p-4 mb-4 rounded-xl text-xs font-bold outline-none bg-slate-50 dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-700 text-slate-800 dark:text-white" onkeyup="kerkoArtikullModal()">
        <button id="modal-kthehu-btn" onclick="shfaqKategoriteModal()" class="hidden mb-3 w-full p-2 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 text-[10px] font-black uppercase rounded-xl flex items-center justify-center gap-2 active-scale"><span>⬅️ Kthehu</span></button>
        <div id="modal-pads-container" class="grid grid-cols-2 gap-3 overflow-y-auto no-scrollbar pb-4"></div>
    </div>
</div>

<div id="modal-manual" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-6 z-[400]">
    <div class="bg-white dark:bg-slate-800 w-full max-w-xs rounded-[35px] p-6 text-center shadow-2xl">
        <h3 id="manual-titulli" class="text-sm font-black mb-4 uppercase text-blue-600">Vendos Shumën</h3>
        <input id="manual-input" type="number" class="w-full p-5 mb-4 rounded-2xl font-black text-4xl text-center border-2 border-blue-200 outline-none dark:bg-slate-900 dark:text-white" inputmode="decimal">
        <div class="flex gap-2">
            <button onclick="mbyllModalManual()" class="w-1/4 p-4 bg-slate-100 dark:bg-slate-700 rounded-2xl font-black italic">X</button>
            <button onclick="mbyllModalManualDheShto()" class="w-3/4 p-4 bg-blue-600 text-white rounded-2xl font-black uppercase">SHTO</button>
        </div>
    </div>
</div>

<div id="modal-pazar-tekst" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-[300]">
    <div class="bg-white dark:bg-slate-800 w-full max-w-xs rounded-[35px] p-6 text-center">
        <h3 class="text-sm font-black mb-4 uppercase text-orange-600">Shto Shënim Manual</h3>
        <input id="pazar-manual-input" type="text" placeholder="Psh: Bukë..." class="w-full p-4 mb-4 rounded-2xl font-bold text-center border-2 border-slate-200 outline-none dark:bg-slate-900 dark:text-white">
        <div class="flex gap-2">
            <button onclick="mbyllManualPazar()" class="w-1/4 p-4 bg-slate-100 dark:bg-slate-700 rounded-2xl font-black italic">X</button>
            <button onclick="shtoNePazarManual()" class="w-3/4 p-4 bg-orange-600 text-white rounded-2xl font-black uppercase">SHTO</button>
        </div>
    </div>
</div>

<script>
    google.charts.load('current', {'packages':['corechart']});
    // KETU VENDOS LINKUN TEND TE RI TE APPS SCRIPT
    const URL = "https://script.google.com/macros/s/AKfycbwWs6QK8PDVSzkUN8pHKoKDjqjO1mveykN9W3rb5faGC02F8QQ8VUtNAhrw5zE6Wbvm/exec"; 

    let uAktual = "", allData = {}, shportaObj = {}, historiData = [], pazarData = [], kategoriaAktuale = "", modalContext = "arka", globalRaport = {}; 

    window.onload = async () => {
        const m = document.getElementById("muaji"), v = document.getElementById("viti");
        const uSelect = document.getElementById("user-select");
        
        // Përgatitja e datave
        const muajt = ["Janar", "Shkurt", "Mars", "Prill", "Maj", "Qershor", "Korrik", "Gusht", "Shtator", "Tetor", "Nëntor", "Dhjetor"];
        muajt.forEach((emri, i) => { m.innerHTML += `<option value="${i+1}" ${i+1==new Date().getMonth()+1?'selected':''}>${emri}</option>`; });
        for(let i=2025; i<=2027; i++) v.innerHTML += `<option value="${i}" ${i==2026?'selected':''}>${i}</option>`;
        
        m.onchange = v.onchange = () => merrRaportin();
        if(localStorage.getItem("dark-mode") === "true") document.body.classList.add("dark");

        // NGARKIMI I PERDORUESVE ME KUJDES
        try {
            const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "get_data" }) });
            allData = await r.json();
            
            if(allData && allData.users) {
                uSelect.innerHTML = ""; // Pastrojmë mesazhin e pritjes
                allData.users.forEach(u => { 
                    uSelect.innerHTML += `<option value="${u}">${u}</option>`; 
                });
            } else {
                uSelect.innerHTML = "<option>Asnjë përdorues i gjetur</option>";
            }
        } catch(e) {
            uSelect.innerHTML = "<option>Gabim në lidhje me Sheets!</option>";
        }
    };

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg; t.className = "show";
        setTimeout(() => { t.className = t.className.replace("show", ""); }, 2000);
    }

    function toggleDark() { 
        let isDark = document.body.classList.toggle("dark"); 
        localStorage.setItem("dark-mode", isDark); 
        if(uAktual) merrRaportin(); 
    }

    document.getElementById("btn-login").onclick = async () => {
        const u = document.getElementById("user-select").value, p = document.getElementById("pass").value;
        if(!u || u.includes("ngarkuar")) return;

        const btn = document.getElementById("btn-login");
        btn.innerText = "Duke u lidhur...";
        
        try {
            const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "login", user: u, pass: p }) });
            const d = await r.json();
            if(d.status == "ok") { 
                uAktual = u; 
                document.getElementById("header-user").innerHTML = `👤 ${u}`; 
                document.getElementById("login-ui").classList.add("hidden"); 
                document.getElementById("app-ui").classList.remove("hidden"); 
                merrRaportin(); fetchPazarCloud();
            } else { 
                alert("PIN i gabuar!"); 
                btn.innerText = "Hyni ne Sistem";
            }
        } catch(e) {
            alert("Gabim rrjeti!");
            btn.innerText = "Hyni ne Sistem";
        }
    };

    // --- FUNKSIONET E TJERA (ARKË, PAZAR, PDF) PA NDRYSHUAR ASGJE ---
    function hapModalFonde() { document.getElementById("modal-fonde").classList.remove("hidden"); }
    function mbyllModalFonde() { document.getElementById("modal-fonde").classList.add("hidden"); }
    async function ruajFonde() {
        let v = document.getElementById("fonde-shuma").value;
        let b = document.getElementById("fonde-burimi").value || "Të ndryshme";
        if(!v || v <= 0) return;
        try {
            await fetch(URL, { method: "POST", body: JSON.stringify({ action: "shto_fond", user: uAktual, shuma: v, burimi: b }) });
            mbyllModalFonde(); merrRaportin(); showToast("U shtua! ✅");
        } catch(e) {}
    }

    function shtoManualNeArke() { document.getElementById("modal-arka-manual").classList.remove("hidden"); }
    function mbyllArkaManual() { document.getElementById("modal-arka-manual").classList.add("hidden"); }
    function kryejShtimManualArka() {
        const e = document.getElementById("arka-emri-input").value, s = document.getElementById("arka-shuma-input").value;
        if(e && s) { shtoNeShporte(e, s); mbyllArkaManual(); }
    }

    function hapModalKategorite(context) {
        modalContext = context; document.getElementById("modal-kategorite").classList.remove("hidden");
        document.getElementById("modal-kat-titulli").innerText = (context==='arka'?"Arka":"Pazari");
        shfaqKategoriteModal();
    }
    function mbyllModalKategorite() { document.getElementById("modal-kategorite").classList.add("hidden"); }
    function shfaqKategoriteModal() {
        document.getElementById("modal-kthehu-btn").classList.add("hidden");
        let h = "";
        allData.kats.forEach(k => {
            let func = (k.kaNen === true || k.kaNen === "Po" || k.kaNen === "TRUE") ? `shfaqNenkategoriteModal('${k.emri}')` : `seleksionoArtikullModal('${k.emri}', 0)`;
            h += `<div class="p-4 bg-slate-50 dark:bg-slate-700/50 rounded-2xl border border-slate-100 dark:border-slate-700 cursor-pointer active-scale" onclick="${func}"><span class="text-[10px] font-black uppercase">${k.emri}</span></div>`;
        });
        document.getElementById("modal-pads-container").innerHTML = h;
    }
    function shfaqNenkategoriteModal(prindi) {
        document.getElementById("modal-kthehu-btn").classList.remove("hidden");
        let h = "";
        allData.nenkats.filter(n => n.prindi == prindi).forEach(n => {
            h += `<div class="p-4 bg-blue-50 dark:bg-blue-900/10 rounded-2xl border border-blue-100 dark:border-blue-800 cursor-pointer active-scale" onclick="seleksionoArtikullModal('${n.emri}', ${n.cmimi || 0})"><span class="text-[10px] font-black uppercase">${n.emri}</span></div>`;
        });
        h += `<div class="p-4 bg-slate-100 border-dashed border-2 rounded-2xl cursor-pointer" onclick="artikullIriNgaNenkategoria()">+ TJETËR</div>`;
        document.getElementById("modal-pads-container").innerHTML = h;
    }
    function artikullIriNgaNenkategoria() { mbyllModalKategorite(); if(modalContext==='arka') shtoManualNeArke(); else shfaqManualPazar(); }

    function seleksionoArtikullModal(emri, cmimi) {
        if(modalContext === 'arka') { if(cmimi > 0) shtoNeShporte(emri, cmimi); else shfaqModalManual(emri); } 
        else { shtoNePazarSpecifik(emri); }
    }

    function shtoNeShporte(e, c) {
        if (shportaObj[e]) shportaObj[e].s += 1; else shportaObj[e] = {s: 1, c: parseFloat(c)};
        perditesoArken();
    }
    function perditesoArken() {
        let t = 0, h = "";
        for(let x in shportaObj) { 
            t += (shportaObj[x].s * shportaObj[x].c); 
            h += `<div class="flex justify-between items-center py-2 border-b dark:border-slate-700"><span>${x} x${shportaObj[x].s}</span><span>${(shportaObj[x].s * shportaObj[x].c)} L</span></div>`;
        }
        document.getElementById("shuma").value = t;
        document.getElementById("shporta-list").innerHTML = h || "Shporta është bosh...";
    }
    function pastroShporten() { shportaObj = {}; perditesoArken(); }

    async function ruajShpenzim() {
        let v = document.getElementById("shuma").value; if(!v || v <= 0) return;
        let btn = document.getElementById("btn-ruaj"); btn.disabled = true;
        let shenime = ""; for(let x in shportaObj) shenime += `${x} x${shportaObj[x].s}, `;
        try {
            await fetch(URL, { method: "POST", body: JSON.stringify({ action: "shto", user: uAktual, kat: "Blerje", shuma: v, shenime: shenime }) });
            pastroShporten(); merrRaportin(); showToast("U krye! ✅");
        } catch(e) {}
        btn.disabled = false;
    }

    async function fetchPazarCloud() {
        try {
            let res = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "get_pazar" }) });
            let dat = await res.json();
            if(dat.pazar_list) { pazarData = JSON.parse(dat.pazar_list); shfaqPazarin(); }
        } catch(e) {}
    }
    function syncPazarCloud() { fetch(URL, { method: "POST", body: JSON.stringify({ action: "sync_pazar", pazar_list: JSON.stringify(pazarData) }) }); }
    function shfaqPazarin() {
        let h = ""; pazarData.forEach((p, i) => { h += `<div class="pad bg-orange-600 text-white" onclick="pazarTeArka('${p.emri}', ${i})">${p.emri}</div>`; });
        document.getElementById("pazar-lista").innerHTML = h;
    }
    function shtoNePazarSpecifik(emri) { pazarData.push({emri: emri}); shfaqPazarin(); syncPazarCloud(); }
    function shfaqManualPazar() { document.getElementById("modal-pazar-tekst").classList.remove("hidden"); }
    function mbyllManualPazar() { document.getElementById("modal-pazar-tekst").classList.add("hidden"); }
    function shtoNePazarManual() { let i = document.getElementById("pazar-manual-input"); if(i.value) { shtoNePazarSpecifik(i.value); i.value = ""; mbyllManualPazar(); } }
    function pazarTeArka(emri, index) { let c = prompt("Çmimi:"); if(c) { shtoNeShporte(emri, c); pazarData.splice(index, 1); shfaqPazarin(); syncPazarCloud(); } }
    function pastroPazarin() { if(confirm("Fshij?")) { pazarData = []; shfaqPazarin(); syncPazarCloud(); } }

    async function merrRaportin() {
        const m = document.getElementById("muaji").value, v = document.getElementById("viti").value;
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "raporti", muaji: m, viti: v, user: uAktual }) });
        const d = await r.json(); globalRaport = d; historiData = d.lista;
        document.getElementById("r-mbetja").innerText = d.mbetja.toLocaleString() + " L";
        let hHtml = ""; d.lista.slice(0, 10).forEach(x => {
            hHtml += `<div class="flex justify-between border-b dark:border-slate-700 py-2"><span>${x.k}</span><span class="${x.t=='hyrje'?'text-green-500':'text-red-400'}">${x.s} L</span></div>`;
        });
        document.getElementById("historiku-list").innerHTML = hHtml;
        shfaqGrafikun(d.grafiku);
    }
    function shfaqGrafikun(data) {
        let gD = [['Kategoria', 'Lekë']]; for(let k in data) gD.push([k, data[k]]);
        new google.visualization.PieChart(document.getElementById('piechart')).draw(google.visualization.arrayToDataTable(gD), {
            backgroundColor: 'transparent', colors: ['#3b82f6', '#10b981', '#ef4444'],
            legend: { position: 'none' }, chartArea: {width:'90%', height:'90%'}, pieHole: 0.5
        });
    }

    function shfaqModalManual(emri) { kategoriaAktuale = emri; document.getElementById("modal-manual").classList.remove("hidden"); }
    function mbyllModalManual() { document.getElementById("modal-manual").classList.add("hidden"); }
    function mbyllModalManualDheShto() { let v = document.getElementById("manual-input").value; if(v) { shtoNeShporte(kategoriaAktuale, v); mbyllModalManual(); } }

    function shkarkoPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.text(`BILANCI - ${uAktual.toUpperCase()}`, 10, 10);
        doc.text(`Mbetja: ${globalRaport.mbetja} L`, 10, 20);
        doc.autoTable({ head: [['Data', 'Kat', 'Shuma']], body: historiData.map(x => [x.d, x.k, x.s]), startY: 30 });
        doc.save("Bilanci.pdf");
    }
</script>
</body>
</html>
